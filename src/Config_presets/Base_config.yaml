        features: ['Sticky_W01_Een_beetje','Sticky_W01_Heel_erg','Submandibular_meandose'] # ,'Sticky_W01_Helemaal_niet' BSL scores, submandibular
      model2:
        features: ['Sticky_W01_Een_beetje','Sticky_W01_Heel_erg','Parotid_sum_sqrt'] # ,'Sticky_W01_Helemaal_niet' BSL, parotid (sqrt(mean dose parotid ipsi) + sqrt(mean dose parotid contra))
  sticky_saliva_early:
    label: 'Sticky_saliva_w06'
    models:
      model1: 
        features: ['Sticky_W01_Een_beetje','Sticky_W01_Heel_erg','Sticky_W01_Helemaal_niet','Submandibular_meandose'] # BSL, Submandibular glands










