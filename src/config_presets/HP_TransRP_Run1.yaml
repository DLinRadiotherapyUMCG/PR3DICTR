general:
  experiment_name: "DL_PLR_TransRP_Run4" # 'DL-PLR-A1_TransRP-Run1_test'
  testMode: False

model:
  model_name: "TransRP"


hyperparam_tuning:
  WandB:
    isEnabled: True
    API_Key: "c7f0f65fac8b7178ad7c5859ba6114775b16e694" # "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" #"wandb_v1_ZngNXgnWc0ttSWH2LMR7mUeUEKM" #"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" # Luis -  # "7ed1cc01e74dab3990ca774ff0461cdcd3ea5c1c" Roberts 
  optuna:
    isEnabled: True                    # perform hyperparameter tuning
    objectives: ["val_mean_Event_C-index"]       # which metrics to optimise on (can be multi-objective)
    objective_direction: ["maximize"]  # direction to optimise each metric in. must be the same length (and order) as objectives
    n_trials: 200                      # number of trials to perform
    n_startup_trials: 30               # number of random trials to perform at the start of the optuna experiment
    kill_trial_threshold: 0.0          # kill a trial (after pruner_n_warmup_folds folds) if the mean metric value is below this threshold
    pruner_n_warmup_folds: 3
    set_new_seeds: True                # whether to set new seeds for each trial
  # ----  Custom Params -------
  # Location:= path variabele in config
  hyperparams:
    
    # TRANSRP stuff
    densenet_depth: 
      name: 'DenseNet_Depth'
      type: 'categorical'
      location: ['model','densenet','model_depth']
      options: [121]
    clinical_features_method:
      name: 'clinical_features_method'
      type: categorical
      location: ['model','TransRP','clinical_features_method']
      options: ['m1', 'm2', 'm3', 'cls']
    ViT_embedding_dim:
      name: 'ViT_embedding_dim'
      type: categorical
      location: ['model','TransRP','vit_dim']
      options: [128, 256, 512, 768]
    ViT_depth:
      name: 'ViT_depth'
      type: categorical
      location: ['model','TransRP','vit_depth']
      options: [2, 4, 6, 8]
    vit_heads:
      name: 'vit_heads'
      type: categorical
      location: ['model','TransRP','vit_heads']
      options: [16, 32, 64, 128]
    vit_mlp_dim:
      name: 'vit_mlp_dim'
      type: categorical
      location: ['model','TransRP','vit_mlp_dim']
      options: [256, 512, 1024]


