general:
  experiment_name: "TRANSRP TEST" # 'DL-PLR-A1_TransRP-Run1_test'
  testMode: False

model:
  model_name: "TransRP" #"dcnn_pooling"
  # general model params
  lrelu_alpha: 0.1         # leaky ReLu value for the convolutional layers
  dropout_p: 0.1           # dropout probability 
  use_bias: True           # whether or not to use a bias term in the conv. layers
  
  output_head:
    name: "multilabel"        # output module name (i.e. linear layers type)   ['multitox', ]
    # Linear layer params (output head)
    n_linear_layers: 1                        # number of (shared) linear layers
    linear_units: [16]                        # size of each (shared) linear layers
    n_clinical_layers: 2                      # number of clinical feature layers
    clinical_variables_linear_units: [32,16]  # sizes of each clinical feature layers
    clinical_variables_position: 1            # index of `linear_units` to which the clinical features are concatenated (1 = first linear_unit). If there are no linear layers, the clinical features are concatenated to the flattening layer
    n_linear_layers_endpoint: 1               # number of non-shared linear layers for all endpoints
    linear_units_endpoint: [64]               # size of each non-shared linear layer
    num_ohe_classes: 1                        # number of output logits per endpoint [1, 2] (usually 1!)  
  resnet:
    model_depth: 10    # [10, 18, 34, 50, 101, 152, 200]
    conv1_kernel_size: 7
    conv1_stride: 2
  densenet: 
    model_depth: 121  # [121, 169, 201, 264]
  ViT:
    vit_patch_size: 8
    vit_dim: 128
    vit_depth: 4
    vit_heads: 8
    vit_mlp_dim: 128
    vit_dim_head: 128
    vit_emb_dropout: 0.2
    vit_dropout_p: 0.2  
  TransRP:
    image_encoder: 'densenet'  # ['resnet', 'densenet'] (requires their respective configs)
    clinical_features_method: 'm3'  # ["m1", "m2", "m3", "m4", "m5"] 
    vit_patch_size: [1,1,1]
    vit_dim: 768
    vit_depth: 12
    vit_heads: 12
    vit_mlp_dim: 3072
    vit_dropout_p: 0.2  


hyperparam_tuning:
  WandB:
    isEnabled: True
    API_Key: "c7f0f65fac8b7178ad7c5859ba6114775b16e694" # "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" #"wandb_v1_ZngNXgnWc0ttSWH2LMR7mUeUEKM" #"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" # Luis -  # "7ed1cc01e74dab3990ca774ff0461cdcd3ea5c1c" Roberts 
  optuna:
    isEnabled: True                    # perform hyperparameter tuning
    objectives: ["val_mean_Event_C-index"]       # which metrics to optimise on (can be multi-objective)
    objective_direction: ["maximize"]  # direction to optimise each metric in. must be the same length (and order) as objectives
    n_trials: 200                      # number of trials to perform
    n_startup_trials: 30               # number of random trials to perform at the start of the optuna experiment
    kill_trial_threshold: 0.5          # kill a trial (after pruner_n_warmup_folds folds) if the mean metric value is below this threshold
    pruner_n_warmup_folds: 3
    set_new_seeds: True                # whether to set new seeds for each trial
  # ----  Custom Params -------
  # Location:= path variabele in config
  hyperparams:
    
      

    
    # TRANSRP stuff
    densenet_depth: 
      name: 'DenseNet_Depth'
      type: 'categorical'
      location: ['model','densenet','model_depth']
      options: [121, 169, 201]
    clinical_features_method:
      name: 'clinical_features_method'
      type: categorical
      location: ['model','TransRP','clinical_features_method']
      options: ['m1', 'm2', 'm3', 'm4']
    ViT_embedding_dim:
      name: 'ViT_embedding_dim'
      type: categorical
      location: ['model','TransRP','vit_dim']
      options: [128, 256, 512, 768]
    ViT_depth:
      name: 'ViT_depth'
      type: categorical
      location: ['model','TransRP','vit_depth']
      options: [2, 4, 6, 8]
    vit_heads:
      name: 'vit_heads'
      type: categorical
      location: ['model','TransRP','vit_heads']
      options: [16, 32, 64, 128]
    vit_mlp_dim:
      name: 'vit_mlp_dim'
      type: categorical
      location: ['model','TransRP','vit_mlp_dim']
      options: [256, 512, 1024]


