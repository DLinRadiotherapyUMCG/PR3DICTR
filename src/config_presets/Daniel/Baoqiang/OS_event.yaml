general:
  experiment_name: Baoqiang_OS_event
  firstRun: false
  region: HNC
  resultsCurrentDirectory: 0
  seed: 42
  testMode: False
  trialNumber: OS_0
  use_test_set: false


columns:
  clinical_features: ["Leeftijd", "PACK_YEARS", 'P16_Negative', 'P16_Positive', 'P16_Unknown', 'WHO_0', 'WHO_1', 'WHO_2', 'WHO_3', 'T_stage_0', 'T_stage_1', 'T_stage_2', 'T_stage_3', 'N_stage_0', 'N_stage_1', 'N_stage_2', 'N_stage_3', 'N_stage_4', 'N_stage_5']
  #clinical_features: ["PACK_YEARS", 'T_stage_0', 'T_stage_1', 'T_stage_2', 'T_stage_3', 'N_stage_0', 'N_stage_1', 'N_stage_2', 'N_stage_3', 'N_stage_4', 'N_stage_5']

  # ["Geslacht", "Leeftijd", "Xerostomia_W01_Helemaal_niet", "Xerostomia_W01_Een_beetje", "Xerostomia_W01_Nogal_Heel_erg"]
  labels: ['OS'] # ['OS'] # ['Xerostomia_M06', 'OS', "Dysphagia_M06"]   # OS_2year_censored
  labels_types: ["Event"] # ["Binary", "Event", "Binary"]
  #- Xerostomia_M06

data:
  event_endpoint_time_unit: "months"
  augmentation:
    isEnabled: true
    list:
      affine:
        isEnabled: true
        scale_max: 0.02
        translate_max: 6
        z_scale: -0.2
      flip:
        isEnabled: true
      noise:
        isEnabled: false
        mean: 0
        std: 0.01
      random_crop:
        isEnabled: false
      rotate:
        isEnabled: true
        max: 15
    mixup:
      alpha: 0.1
      isEnabled: false
    prob: 0.5
  
  dataset_csv: OPC_data.csv
  equalizer:
    isEnabled: false
    ratio: 0.5
    resamplingDirection: over
  excluded_values: []
  excluded_variable_name: []
  image_keys:
  - ct
  - pet
  - gtv_total
  
  source: UMCG
  stratify_on: ['OS_event']


model:
  TransRP:
    clinical_features_method: m2
    image_encoder: densenet
    vit_depth: 12
    vit_dim: 768
    vit_dropout_p: 0
    vit_heads: 12
    vit_mlp_dim: 3072
    vit_patch_size:
    - 1
    - 1
    - 1
  ViT:
    vit_depth: 4
    vit_dim: 128
    vit_dim_head: 128
    vit_dropout_p: 0.2
    vit_emb_dropout: 0.2
    vit_heads: 8
    vit_mlp_dim: 128
    vit_patch_size: 8
  densenet:
    model_depth: 121
  dropout_p: 0.0
  efficientnetv2:
    use_bias: true
  lrelu_alpha: 0.01
  model_name: TransRP
  resnet:
    conv1_kernel_size: 7
    conv1_stride: 2
    model_depth: 18
  use_bias: true

  output_head:
    name: "multilabel"        # output module name (i.e. linear layers type)   ['multilabel', ]
    # Linear layer params (output head)
    n_linear_layers: 1                        # number of (shared) linear layers
    linear_units: [256]                        # size of each (shared) linear layers
    n_clinical_layers: 0                  # number of clinical feature layers
    clinical_variables_linear_units: []  # sizes of each clinical feature layers
    clinical_variables_position: 1            # index of `linear_units` to which the clinical features are concatenated (1 = first linear_unit). If there are no linear layers, the clinical features are concatenated to the flattening layer
    n_linear_layers_endpoint: 1               # number of non-shared linear layers for all endpoints
    linear_units_endpoint: []               # size of each non-shared linear layer
    num_ohe_classes: 1                        # number of output logits per endpoint [1, 2] (usually 1!)


paths:
  csv: /home/macraedc/data
  images: /home/macraedc/data/preprocessed_OS_dataset_2mm
  results: /home/macraedc/


training:
  GradNorm:
    alpha: 0.1
    isEnabled: false
    learning_rate: 0.001
  batch_size: 4
  loss:
    ASL:
      gamma_neg: 4
      gamma_pos: 1
    BCE:
      pos_weight:
      - 1
    focal:
      alpha: 0.25
      gamma: 2
    name: BCE
    reduction: none
  max_epochs: 200
  optimizer:
    learning_rate: 0.0002
    momentum: 0.9
    name: SGD
    weight_decay: 0.0
  patience: 10
  
  show_progress_bar: true
  stopping_criteria: loss
  validation_interval: 1


evaluation:
  main_metric: 
    Binary: "AUC"    # the metric shown during training
    Event: "C-index"
  metrics_list: ["C-index"]

hyperparam_tuning:
  WandB:
    isEnabled: false                   # whether or not to log to Weights & Biases
    API_Key: "c7f0f65fac8b7178ad7c5859ba6114775b16e694"     # WandB API key of your account
  optuna:
    isEnabled: False   