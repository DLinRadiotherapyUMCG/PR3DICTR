uncertainty:
  MC_dropout:
    dropout_p: 0.1 


columns:
  clinical_features: ["Leeftijd", "PACK_YEARS", 'P16_Negative', 'P16_Positive', 'P16_Unknown', 'WHO_0', 'WHO_1', 'WHO_2', 'WHO_3', 'T_stage_0', 'T_stage_1', 'T_stage_2', 'T_stage_3', 'N_stage_0', 'N_stage_1', 'N_stage_2', 'N_stage_3', 'N_stage_4', 'N_stage_5']
  #clinical_features: ["PACK_YEARS", 'T_stage_0', 'T_stage_1', 'T_stage_2', 'T_stage_3', 'N_stage_0', 'N_stage_1', 'N_stage_2', 'N_stage_3', 'N_stage_4', 'N_stage_5']

  # ["Geslacht", "Leeftijd", "Xerostomia_W01_Helemaal_niet", "Xerostomia_W01_Een_beetje", "Xerostomia_W01_Nogal_Heel_erg"]
  labels: ['OS_2year_censored'] # ['OS'] # ['Xerostomia_M06', 'OS', "Dysphagia_M06"]   # OS_2year_censored
  labels_types: ["Binary"] # ["Binary", "Event", "Binary"]
  #- Xerostomia_M06

data:
  event_endpoint_time_unit: "months"
  augmentation:
    isEnabled: true
    list:
      affine:
        isEnabled: true
        scale_max: 0.02
        translate_max: 6
        z_scale: -0.2
      flip:
        isEnabled: true
      noise:
        isEnabled: false
        mean: 0
        std: 0.01
      random_crop:
        isEnabled: false
      rotate:
        isEnabled: true
        max: 15
    mixup:
      alpha: 0.1
      isEnabled: false
    prob: 0.5
  
  dataset_csv: OPC_OS_patients.csv
  equalizer:
    isEnabled: true
    ratio: 0.5
    resamplingDirection: over
  excluded_values: []
  excluded_variable_name: []
  image_keys:
  - ct
  - pet
  - gtv_total
  
  source: UMCG
  stratify_on: ['OS_2year_censored']


model:
  TransRP:
    clinical_features_method: m2
    image_encoder: densenet
    vit_depth: 12
    vit_dim: 768
    vit_dropout_p: 0
    vit_heads: 12
    vit_mlp_dim: 3072
    vit_patch_size:
    - 1
    - 1
    - 1
  ViT:
    vit_depth: 4
    vit_dim: 128
    vit_dim_head: 128
    vit_dropout_p: 0.2
    vit_emb_dropout: 0.2
    vit_heads: 8
    vit_mlp_dim: 128
    vit_patch_size: 8
  clinical_variables_linear_units: []
  clinical_variables_position: 1
  densenet:
    model_depth: 121
  dropout_p: 0.0
  efficientnetv2:
    use_bias: true
  linear_units: [256]
  linear_units_endpoint: []
  lrelu_alpha: 0.01
  model_name: TransRP
  n_clinical_layers: 0
  n_linear_layers: 1
  n_linear_layers_endpoint: 2
  num_ohe_classes: 1
  output_head:
    name: multilabel
  resnet:
    conv1_kernel_size: 7
    conv1_stride: 2
    model_depth: 18
  use_bias: true


paths:
  csv: /home/macraedc/data/uncertainty_project
  images: /home/macraedc/data/preprocessed_OS_dataset_2mm
  # results: /home/macraedc/rt_pred_results


training:
  gradient_accumulation_steps: 1
  GradNorm:
    alpha: 0.1
    isEnabled: false
    learning_rate: 0.001
  batch_size: 4
  loss:
    ASL:
      gamma_neg: 4
      gamma_pos: 1
    BCE:
      pos_weight:
      - 1
    focal:
      alpha: 0.25
      gamma: 2
    name: BCE
    reduction: none
  max_epochs: 200
  optimizer:
    learning_rate: 0.0002
    momentum: 0.9
    name: SGD
    weight_decay: 0.0
  patience: 10
  scheduler:
    T_0: 40
    T_mult: 1
    eta_min: 1.0e-08
    name: false
  show_progress_bar: false
  stopping_criteria: loss
  validation_interval: 1
