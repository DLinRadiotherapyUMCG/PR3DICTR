general:
  region: 'LUNG'
  seed: 42
  firstRun: false
  experiment_name: "LUNG MODELLING WITH PET PROJECTS" # 'DL-PLR-A1_TransRP-Run1_test'
  trialNumber: "Trial_?"
  resultsCurrentDirectory: ""
  testMode: False
  use_test_set: False

columns:
  labels: ['LR']
  labels_types: ["Event"]
  clinical_features: ["Gender","Age","Proton","Chemo","Immuno","Pulm","PerformanceScore","SmokingCat"]

paths:
  csv: "/scratch/hb-LungModeling/Data/DLPOS/clinicalData/Version3/" #"/scratch/hb-LungModeling/Data/DLPOS/clinicalData/Version3/"
  images: "/scratch/hb-LungModeling/Data/DLPOS/PET_Projects_Imaging_v2_SameSize/"  
  results: "/scratch/hb-LungModeling/Results/Daniel_test_folder/" #"/scratch/hb-LungModeling/Results/OS_DL/"



model:
  model_name: "TransRP" #"dcnn_pooling"
  # general model params
  lrelu_alpha: 0.1         # leaky ReLu value for the convolutional layers
  dropout_p: 0.1           # dropout probability 
  use_bias: True           # whether or not to use a bias term in the conv. layers
  
  output_head:
    name: "multilabel"        # output module name (i.e. linear layers type)   ['multitox', ]
    # Linear layer params (output head)
    n_linear_layers: 1                        # number of (shared) linear layers
    linear_units: [16]                        # size of each (shared) linear layers
    n_clinical_layers: 2                      # number of clinical feature layers
    clinical_variables_linear_units: [32,16]  # sizes of each clinical feature layers
    clinical_variables_position: 1            # index of `linear_units` to which the clinical features are concatenated (1 = first linear_unit). If there are no linear layers, the clinical features are concatenated to the flattening layer
    n_linear_layers_endpoint: 1               # number of non-shared linear layers for all endpoints
    linear_units_endpoint: [64]               # size of each non-shared linear layer
    num_ohe_classes: 1                        # number of output logits per endpoint [1, 2] (usually 1!)  
  resnet:
    model_depth: 10    # [10, 18, 34, 50, 101, 152, 200]
    conv1_kernel_size: 7
    conv1_stride: 2
  densenet: 
    model_depth: 121  # [121, 169, 201, 264]
  ViT:
    vit_patch_size: 8
    vit_dim: 128
    vit_depth: 4
    vit_heads: 8
    vit_mlp_dim: 128
    vit_dim_head: 128
    vit_emb_dropout: 0.2
    vit_dropout_p: 0.2  
  TransRP:
    image_encoder: 'densenet'  # ['resnet', 'densenet'] (requires their respective configs)
    clinical_features_method: 'm3'  # ["m1", "m2", "m3", "m4", "m5"] 
    vit_patch_size: [1,1,1]
    vit_dim: 768
    vit_depth: 12
    vit_heads: 12
    vit_mlp_dim: 3072
    vit_dropout_p: 0.2  



data:
  dataset_csv: 'DL_Dataset_OS_Habrok_v3.csv' #'DL_Dataset_SmallSimple.csv'
  image_keys: []  # ["PlanCT","PET","rtdose"] # "pCT.nii.gz"   ,"rtdose"]
  event_endpoint_time_unit: "years"

  dataloader:
    num_workers: 8           # number of workers (cores) to use for data loading in each training batch
    dataset_type: 'standard'
    smartcache:
      cache_rate: 0.5                  # what fraction of the dataset should be kept in the RAM 
      num_replace_workers: 4           # number of workers to replace cache with

  preprocessing:
    isEnabled: true
    crop: false
    needs_scaling: ["PlanCT", 'PET','rtdose']
    crop_shape: [96, 96, 96]
    PlanCT:
      a_min: -1000
      a_max: 600
      b_min: 0
      b_max: 1
      clip: true
    rtdose:
      a_min: 0
      a_max: 8000
      b_min: 0
      b_max: 1
      clip: true
    PET:             # example of how to scale a PET image
      a_min: 0
      a_max: 50      # SUV units
      b_min: 0
      b_max: 1
      clip: true
    segmentation_map:
      target_labels: []

  kFolds:
    n_splits: 4           # the number of data splits to make
    n_iterations: 4       # the number of k-fold iterations to perform (i.e. how many to actually train, must be less than or equal to 'n_splits')
    validation_size: 0.3  # if only 1 split; this is the size of the validation set, the rest goes to training set
    split_strategy: 'stratified'  # how to perform the splitting of K_folds ['stratified', 'random']

  equalizer:
    isEnabled: false     # whether or not to over/under-sampling the training dataset
    ratio: 0.5           # over/under sample until the ratio of positive and negative instances of each class reaches this value
    resamplingDirection: 'over'   # ['over', 'under']  

  augmentation:
    isEnabled: true
    list:
      flip:
        isEnabled: True
      random_crop:       
        isEnabled: False
      affine:
        isEnabled: True
        translate_max: 8   # pixels
        scale_max: 0.02
        z_scale: -0.2
      rotate:
        isEnabled: True
        max: 45 # degree
      noise:
        isEnabled: True
        mean: 0
        std: 0.1





training:
  max_epochs: 1
  batch_size: 8
  validation_interval: 1
  patience: 20
  stopping_criteria: "loss"  # What criteria to use for early stopping ['loss', 'metric']
  show_progress_bar: false    # whether to show the progress bar on each training epoch (recommend=False for Habrok)

  optimizer:
    name: "Adam"
    learning_rate: 0.001
    weight_decay: 0.0
    momentum: 0.0

  loss:
    name: "BCE"    # loss function ['BCE', 'focal', 'hill', 'ASL', 'NLLL']
    reduction: "none"  # loss function reduction (keep as 'none' !!!)
    BCE:
      pos_weight: [1]    # weights for positive instances of each class (list of same length as endpoint labels list) (default:[1])
    focal:
      gamma: 2          # gamma for focal loss (default: 2)
      alpha: 0.25       # alpha value for focal loss (default: 0.25)
    ASL:
      gamma_neg: 4     # gamma_negative value for focal loss (default: 4)
      gamma_pos: 1     # gamma_positive value for focal loss (default: 1)

  scheduler:
    name: False         # Name of scheduler to use [None, "cosine", "step", "plateau"]
    cosine:
      T_0: 20             # (cosine) number of epochs until  restart
      T_mult: 1           # (cosine) a factor increases after a restart (default: 1)
      eta_min: 0.00000001 # (cosine)  Minimum learning rate. Default: 0.
    step:
      step_size: 5       # (step) number of epochs between each learning rate decay
      gamma: 0.1          # (step) learning rate decay factor
    plateau:
      mode: 'min'               # 'min' or 'max' depending on whether the monitored metric needs to be minimised or maximised
      factor: 0.1               # factor to reduce the learning rate by
      patience: 10              # number of epochs with no improvement after which learning rate will be reduced
      min_lr: 0.00000001        # minimum learning rate

evaluation:
  main_metric: 
    Event: "C-index"
  metrics_list: ["C-index"] #  ["AUC", "accuracy"]   # the metrics to calculate at the end of each fold (list of strings, see constant.py for options)
  metrics:
    threshold: 'YoudenJ'  # how to define the classification metrics threshold
    calibration_bins: 10  # number of bins to use in the calibration metrics
  visualisations: 
    list: ['calibration', 'reliability', 'confusion_matrix', 'roc_curve', 'kaplan_meier'] # which plots to save per fold
    n_bins: 10            # nunber of bins to use in the calibration and reliability plot
    kaplan_meier_max_timepoint: 5  # maximum time point to show in the Kaplan-Meier plot

hyperparam_tuning:
  WandB:
    isEnabled: True
    API_Key: "c7f0f65fac8b7178ad7c5859ba6114775b16e694" # "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" #"wandb_v1_ZngNXgnWc0ttSWH2LMR7mUeUEKM" #"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" # Luis -  # "7ed1cc01e74dab3990ca774ff0461cdcd3ea5c1c" Roberts 
