      name: 'Model_Selected'
      type: 'categorical'
      location: ["model",'model_name']
      options: ['TransRP']
      
#    Model_leakyReLu:
#      name: 'M_LeakyReLu'
#      type: 'float'
#      location: ["model",'lrelu_alpha']
#      min: 0.0001
#      max: 0.2
#    Model_DropOut:
#      name: 'M_DropOut'
#      type: 'float'
#      location: ["model",'dropout_p']
#      min: 0.0001
#      max: 0.2
    Model_N_LinearLayers:
      name: 'M_N_LL'
      type: 'int'
      location: ["model",'output_head','n_linear_layers']
      min: 1
      max: 5
    Model_N_ClinicalLayers:
      name: 'M_N_CL'
      type: 'int'
      location: ["model",'output_head','n_clinical_layers']
      min: 1
      max: 5


    optimizer:
      name: "Optimizer" 
      type: 'categorical'
      location: ["training",'optimizer','name']
      options: ['Adam','AdaBound','SGD']
    learning_rate: 
      name: 'Learning_rate'
      type: 'float'
      location: ['training','optimizer','learning_rate']
      min: 0.0000005
      max: 0.05


        
saving:
  config: True               # whether to save the config as a .yaml fule
  best_model: True           # whether to save the model weights on each fold
  plot_training_slices:      # plotting the model inputs on certain batches
    isEnabled: False          # enable/disable these plots
    folder_name: 'figures'   # folder name to save the .png files into
    every_n_epochs: 50       # make a plot of the first batch every N epochs
    n_patients_per_epoch: 1  # how many patients to plot from a batch
    n_slices_per_patient: 8  # how many slices to plot per patient
  
  filenames:
    model_summary: "model_summary.txt"    # filename of the model summary
    config_yaml: "DlModel_Config.yaml"    # filename of the config to save
    model_weights: "DlModel_Weights.pth"  # filename of the (best) model weights
    library_dependencies_file: "library_dependencies.txt"
    predictions_csv: "model_predictions.csv"  # filename of the predictions on the train/val sets
    test_set_predictions_csv: "test_set_predictions.csv"   # filename of the predictions in the test set (external validation set source are appended to this, e.g. "_MDACC.csv")
    ensemble_predictions_csv: "ensemble_predictions.csv"   # filename of the ensemble predictions
      
  ModelCard:
    isEnabled: True
    saveLocation : '/scratch/hb-LungModeling/Results/OS_DL//Modelcards/'
    loaded_projectcard_filename : 'projectdetails_card'
    saved_modelcard_filename : 'autogenerated_card'
      