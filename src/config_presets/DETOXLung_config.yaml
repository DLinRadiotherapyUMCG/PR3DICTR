general:
  seed: 42
  firstRun: false
  experiment_name: 'Habrok_ResNet18_12_2024'
  trialNumber: "Trial_X"
  resultsCurrentDirectory: ""
  testMode: False

columns:
  labels: ["RP_OneYear"]
  clinical_features: ["SmokerActive","SmokerStopped", "Gender",
  "Age","ChemoRad", "ImmunoTherapy",
  "OperationPerformed","SmokingUntilRecently","Pulmonary_Comorbidity", "DosePerFraction"] #, "T_Stage","N_Stage","M_Stage"]
  #logistic_regression_features: ['']

paths:
  csv:    "//zkh/appdata/RTDicom/Projectline_modelling_lung_cancer/Users/Robert van der Wal/06_Results/04_DataGathering/2024_12_01/DL_Data/Clin_Data/"   
  images: "//zkh/appdata/RTDicom/Projectline_modelling_lung_cancer/Users/Robert van der Wal/06_Results/04_DataGathering/2024_12_01/DL_Data/ViT_Dataset/"
  results: "C:/Users/WalR/OneDrive - UMCG/Documents/Data/Modelling_Results/"

#run:
#  patienceExhausted: False
#  patienceExhaustedIndex: 0

model:
  model_name: "resnet" #"dcnn_pooling"

  resnet:
    model_depth: 18    # [10, 18, 34, 50, 101, 152, 200]
    conv1_kernel_size: 7
    conv1_stride: 2
  densenet: 
    model_depth: 121  # [121, 169, 201, 264]
  ViT:
    vit_patch_size: 16
    vit_dim: 128
    vit_depth: 4
    vit_heads: 8
    vit_mlp_dim: 128
    vit_dim_head: 128
    vit_emb_dropout: 0.2
    vit_dropout_p: 0.2  
  TransRP:
    image_encoder: 'resnet' # 'densenet'  # ['resnet', 'densenet'] (requires their respective configs)
    clinical_features_method: 'm2'  # ["m1", "m2", "m3", "m4", "m5"] 
    vit_patch_size: [2,2,2]
    vit_dim: 768
    vit_depth: 6
    vit_heads: 12
    vit_mlp_dim: 3072
    vit_dropout_p: 0.2  

   # general model params
  lrelu_alpha: 0.1
  dropout_p: 0.1
  use_bias: True
  # Linear layer params (output head)
  n_linear_layers: 1
  linear_units: [64] # shared layers for model head
  n_clinical_layers: 0 #2
  clinical_variables_linear_units: [] # [32,16]
  clinical_variables_position: 1
  n_linear_layers_endpoint: 0
  linear_units_endpoint: []
  num_ohe_classes: 1

data:
  source: 'UMCG'
  dataset_csv: 'stratified_sampling_full_manual_94_edited.csv'
  #splitvar: "Split"
  #patientVar: 'PatientID'
  #patientID_length: 7
  stratify_on: ["RP_OneYear", "ImmunoTherapy"]
  excluded_variable_name: [] # ExcludedVar           # column name of variable to exlude patients by
  excluded_values: [] # ExcludedValue                # values of ^this^  variable to exclude patients by
  image_keys:  ['ct', 'rtdose', 'segmentation_map']  # the keys of the images to load
  image_num_dimensions: 3  # each image is 3D, so this is 3


  dataloader:
    dataset_type: "cache"
    dataloader_type: "standard"
    num_workers: 8           # number of workers (cores) to use for data loading in each training batch
    smartcache:
      cache_rate: 0.5  # half of dataset is in RAM
      num_replace_workers: 4 # number of workers to replace cache

  preprocessing:
    isEnabled: false
    crop: true
    crop_shape: [96, 96, 96]
    needs_scaling: ["ct", "rtdose", 'mri']  # list of image types that need to be scaled (a_min, a_max, b_min, b_max, and clip must be defined)
    needs_label_mapping: ["segmentation_map"]   # list of image types that need label mapping (i.e. binarising OAR structures. target_labels must be defined)
    ct:
      a_min: -1200
      a_max: 400
      b_min: 0
      b_max: 1
      clip: true
    rtdose:
      a_min: 0
      a_max: 8000
      b_min: 0
      b_max: 1
      clip: true
    segmentation_map:
      target_labels: []

  kFolds:
    n_splits: 5        # the number of data splits to make
    n_iterations: 5    # the number of k-fold iterations to perform (i.e. how many to actually train, must be less than or equal to 'n_splits')
    validation_size: 0.2  # if only 1 split
    split_strategy: 'stratified'  # ['stratified', 'random']

  equalizer:
    isEnabled: False
    ratio: 0.5
    resamplingDirection: 'over'   # ['over', 'under']

  augmentation:
    isEnabled: true
    prob: 0.5
    list:
      flip:
        isEnabled: True
      random_crop:  
        isEnabled: False
      affine:
        isEnabled: True
        translate_max: 30   # pixels
        scale_max: 0.2
        z_scale: -0.2
      rotate:
        isEnabled: True
        max: 80 # degree
      noise:
        isEnabled: True
        mean: 0
        std: 0.01

    mixup:
      isEnabled: True
      alpha: 1.0        # 0.0 - 3.0 (float): --> hyperparameter tuning

training:
  max_epochs: 60
  batch_size: 16
  validation_interval: 1
  patience: 10
  show_progress_bar: False

  optimizer:
    name: "Adam"
    learning_rate: 0.00040096753586928423
    weight_decay: 0.0000001178312895422
    momentum: 0.00001

  loss:
    name: "BCE"
    reduction: "none"
    BCE:
      pos_weight: [1]     # Hyperparameter tuning candidate
    focal:
      gamma: 2
      alpha: 0.25
    ASL:
      gamma_neg: 4
      gamma_pos: 1

  scheduler:
    name: "cosine"
    T_0: 20               # Hyperparameter tuning candidate
    T_mult: 1
    eta_min: 0.0000001 #0.00000001

evaluation:
  main_metric: "AUC"
  metrics_list: ["AUC", 'F1_score', 'ECE', 'ACE'] #  ["AUC", "accuracy"]
  metrics:
    threshold: 'YoudenJ'
    calibration_bins: 5
  visualisations: 
    list: ['calibration', 'reliability', 'confusion_matrix', 'roc_curve']
    n_bins: 10

hyperparam_tuning:
  WandB:
    isEnabled: True
    API_Key: "7ed1cc01e74dab3990ca774ff0461cdcd3ea5c1c"
    MetricsMonitor: [ "train_AUC","train_loss","train_acc",
      "eval_AUC","eval_loss","eval_acc"]
  optuna:
    isEnabled: True
    n_trials: 40
    objectives: ["val_mean_loss"]
    objective_direction: ["minimize"]
    kill_trial_threshold: -1 #0.6
  # ----  Custom Params -------
  # Location:= path variabele in config
  hyperparams:
    Model_Selected:
      name: 'Model_Selected'
      type: 'categorical'
      location: ["model","model_name"]
      options: ['resnet']
    Model_Depth:
      name: "Model_Depth"
      location: ["model","resnet","model_depth"]
      type: 'categorical'
      options: [18]
    #Resampling_ratio:
    #  name: 'Resampling_ratio'
    #  type: 'float'
    #  location: ["data","equalizer","ratio"]  
    #  min: 0.5
    #  max: 0.5
    DropOut:
      name: 'Dropout'
      type: 'float'
      location: ["model","dropout_p"]  
      min: 0.01
      max: 0.2
    #Weight_decay: 
    #  name: 'Weight_Decay'
    #  type: 'float'
    #  location: ["training",'optimizer','weight_decay']
    #  min: 0.000000001
    #  max: 0.0000001
    learning_rate: 
      name: 'Learning_rate'
      type: 'float'
      location: ['training','optimizer','learning_rate']
      min: 0.000005
      max: 0.0003
    optimizer:
      name: "Optimizer" 
      type: 'categorical'
      location: ["training",'optimizer','name']
      options: ['Adam']
    loss_function:
      name: loss_function
      type: 'categorical'
      location: ['training','loss','name']
      options: ['BCE']
    scheduler_T0:
      name: 'scheduler_T0'
      type: 'int'
      location: ['training','scheduler','T0']
      min: 10
      max: 30

    #loss_lamb:
    #  name: Loss_Lamb
    #  type: 'float'
    #  location: ['training','loss','lamb']
    #  min: 0.1
    #  max: 3.0
    #loss_margin:
    #  name: Loss_Margin
    #  type: 'float'
    #  location: ['training','loss','margin']
    #  min: 0.1
    #  max: 3.0
    #loss_gamma:
    #  name: loss_gamma
    #  type: 'float'
    #  location: ['training','loss','gamma']
    #  min: 0.1
    #  max: 3.0
    
    batch_size:
      name: batch_size
      type: 'categorical'
      location: ["training","batch_size"]
      options: [8,12,16]

    #================= AUGMENTATION ======================
      
    augmentation_rotate:
      name: augm_rotate_strength
      type: 'float'
      location: ['data','augmentation',"list","rotate","max"]
      min: 20
      max: 90

    augmentation_Zscale:
      name: aug_z_Zoom
      type: 'float'
      location: ['data','augmentation',"list","affine","z_scale"]
      min: -0.2
      max: 0.4

    augmentation_scaleMax:
      name: aug_ScaleMax
      type: 'float'
      location: ['data','augmentation',"list","affine","scale_max"]
      min: 0
      max: 0.4

    augmentation_translate_max:
      name: translate_max
      type: 'float'
      location: ['data','augmentation',"list","affine","translate_max"]
      min: 2
      max: 30

    # ----  NN Layer Params -------
    # Indicate amount of layers for different parts of Neural Network
    n_linear_layers:
      type: 'int'
      name: 'n_linear_layers'
      location: ['model','n_linear_layers']
      min: 0
      max: 3
      step: 1
      log: False

    # n_clinical_layers:
    #  type: 'int'
    #  name: 'n_clinical_layers'
    #  location: ['model','n_clinical_layers']
    #  min: 0
    #  max: 3
    #  step: 1
    #  log: False
  
  # Complex hyperparams: Initialise every layer of the Neural Network with given ranges
  derived:
    n_linear_layers:
      linear_units:
        type: 'categorical'
        name: 'linear_units'
        location: ['model','linear_units']
        options: [4,8,16,32,64,128,256]
        log: False

    # n_clinical_layers:
    #   filters:
    #     type: 'int'
    #     name: 'Clin_filter'
    #     location: ['model','n_clinical_layers']
    #     min: 8
    #     max: 32
    #     step: 8
    #     log: False
      
        
saving:
  config: True
  best_model: True
  plot_training_slices:
    isEnabled: True
    folder_name: 'figures'
    every_n_epochs: 50
    n_patients_per_epoch: 1
    n_slices_per_patient: 8

  fileNames:
    model_summary: "model_summary.txt"
    config_yaml: "DlModel_Config.yaml"
    model_weights: "DlModel_Weights.pth"
    predictions_csv: "model_predictions.csv"
    test_set_predictions_csv: "test_set_predictions.csv"
    ensemble_predictions_csv: "ensemble_predictions.csv"
      