
data:
  n_patients_total: 400

  kFolds:
    isEnabled: true
    n_splits: 5        # the number of data splits to make
    n_iterations: 2    # the number of k-fold iterations to perform (i.e. how many to actually train, must be less than or equal to 'n_splits')

training:
  max_epochs: 3
  batch_size: 16
  validation_interval: 1
  patience: 5

